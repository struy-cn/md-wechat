name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.4.0
        with:
          persist-credentials: false
      - name: Github Pages
        uses: StruggleYang/VuePagesAction@2.0.0
        with:
          cname: md.struy.cn
          useyarn: false
